name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  alpha-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run alpha state tests
        run: npm test
